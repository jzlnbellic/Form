<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Registration form</title>
        <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #363636;
            font-family: sans-serif;
        }
        form{
             align-items: left;
        }
        </style>
    </head>

    <body>

            <option value="191">2018 fifa football</option>
            <option value="192">Pablo</option>

            <option value="99">thank you for asking</option>

        <label for="dob">Date of Birth : </label>
        <input type="date" id="dob" name="dob">
        <br>
        <label for="course">Select course  : </label>
        <input type="radio" id="bus conductor" name="joli">
        <label for="bus conductor">bus conductor</label>
        <input type="radio" id="thengg keral" name="joli">
        <label for="thengg keral">thengg keral</label>
        <input type="radio" id="kalpani" name="joli">
        <label for="kalpani">kalpani</label>
        <input type="radio" id="poratta adikal" name="joli">
        <label for="poratta adikal">poratta adikal</label>
        <input type="radio" id="kabar kuzhikal" name="joli">
        <label for="kabar kuzhikal">kabar kuzhikal</label>
        <input type="radio" id="cooker" name="joli">

        <br>
        <label for="addon">Select 2 addon  : </label>
        <input type="checkbox" id="btech" name="btech">

        <input type="checkbox" id="bca" name="bca">
        <label for="bca">bca</label>
        <input type="checkbox" id="bba" name="bba">

        <input type="checkbox" id="mtech" name="mtech">
        <label for="mtech">mtech</label>
        <input type="checkbox" id="mba" name="mba">
        <label for="mba">mba</label>

        <br>
        <button type="submit">Submit</button>

    </body>
</html>
